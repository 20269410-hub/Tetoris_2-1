<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레트로 도트 테트리스 - GHOST GUIDE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  body {
    background: #050505;
    color: white;
    text-align: center;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    touch-action: none; 
  }

  /* 메뉴 및 오버레이 스타일 */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
  }

  #startMenu { display: flex; }
  #gameOverScreen { display: none; }
  #helpScreen { display: none; }
  #pauseMenu { display: none; }

  .title-neon {
    font-size: 30px;
    color: #fff;
    text-shadow: 0 0 10px #00ccff, 0 0 20px #00ccff, 0 0 40px #00ccff;
    margin-bottom: 30px;
    line-height: 1.4;
  }

  .best-score {
    color: #f1c40f;
    margin-bottom: 40px;
    font-size: 12px;
    letter-spacing: 2px;
  }

  .menu-btn-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 15px 30px;
    font-family: 'Press Start 2P', cursive;
    cursor: pointer;
    font-size: 12px;
    box-shadow: 4px 4px 0 #555;
    transition: 0.1s;
    width: 220px;
  }

  .btn:hover { background: #33FF00; box-shadow: 4px 4px 0 #006400; }
  .btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0; }
  
  .btn.secondary { background: #444; color: #fff; }
  .btn.secondary:hover { background: #FF0033; box-shadow: 4px 4px 0 #8B0000; }

  /* 게임 UI 스타일 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 330px;
    margin-bottom: 10px;
  }

  .pause-btn {
    background: transparent;
    border: 2px solid #555;
    color: white;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    padding: 5px 10px;
    cursor: pointer;
  }
  
  .pause-btn:hover { border-color: #33FF00; color: #33FF00; }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .game-container {
    position: relative;
    display: flex;
    gap: 15px;
    background: #111;
    padding: 10px;
    border: 4px solid #333;
  }

  canvas { background: #000; display: block; image-rendering: pixelated; }

  .side-panel { width: 100px; display: flex; flex-direction: column; gap: 15px; }
  .info-box { background: #000; padding: 10px; border: 2px solid #444; }
  .info-label { font-size: 8px; color: #aaa; margin-bottom: 8px; }
  .info-value { font-size: 14px; color: #fff; }
  #nextCanvas { margin: 5px auto 0; border: 1px solid #333; }
  .controls { margin-top: auto; font-size: 7px; color: #888; text-align: left; line-height: 1.8; }

  .mobile-controls {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    justify-content: center;
  }

  .m-btn {
    width: 60px;
    height: 60px;
    background: #222;
    border: 3px solid #555;
    color: white;
    font-size: 24px;
    border-radius: 10px;
    touch-action: none; 
    user-select: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    transition: background 0.1s;
  }

  .m-btn.active {
    background: #444;
    border-color: #33FF00;
    color: #33FF00;
  }

  .help-text {
    color: #fff;
    font-size: 10px;
    line-height: 2.5;
    text-align: left;
    margin-bottom: 30px;
  }

  @media (max-width: 400px) {
    .game-container { gap: 10px; padding: 5px; }
    .side-panel { width: 80px; }
    .m-btn { width: 50px; height: 50px; font-size: 20px; }
    .controls { display: none; } 
  }
</style>
</head>
<body>

<div class="game-wrapper">
  
  <div class="top-bar">
    <div></div>
    <button class="pause-btn" onclick="togglePause()">II PAUSE</button>
  </div>

  <div class="game-container">
    
    <div id="startMenu" class="overlay">
      <div class="title-neon">TETRIS<br>DOT</div>
      <div class="best-score">BEST: <span id="bestScore">0</span></div>
      <div class="menu-btn-group">
        <button class="btn" onclick="startGame()">START GAME</button>
        <button class="btn secondary" onclick="showHelp()">HOW TO PLAY</button>
      </div>
    </div>

    <div id="helpScreen" class="overlay">
      <h2 style="color: #33FF00; font-size: 16px; margin-bottom: 25px;">CONTROLS</h2>
      <div class="help-text">
        <p>← → : MOVE LEFT/RIGHT</p>
        <p>↑ &nbsp;&nbsp;: ROTATE PIECE</p>
        <p>↓ &nbsp;&nbsp;: SOFT DROP</p>
        <p>↓(x2): HARD DROP</p>
      </div>
      <button class="btn secondary" onclick="hideHelp()">BACK TO MENU</button>
    </div>

    <div id="pauseMenu" class="overlay">
      <h2 style="color: #FFCC00; font-size: 20px; margin-bottom: 30px;">PAUSED</h2>
      <div class="menu-btn-group">
        <button class="btn" onclick="togglePause()">RESUME</button>
        <button class="btn secondary" onclick="quitGame()">QUIT TO MENU</button>
      </div>
    </div>

    <div id="gameOverScreen" class="overlay">
      <h2 style="color: #ff0033; font-size: 20px; margin-bottom: 20px;">GAME OVER</h2>
      <div style="color: #aaa; font-size: 8px; margin-bottom: 5px;">FINAL SCORE</div>
      <div id="finalScore" style="font-size: 18px; margin-bottom: 30px;">0</div>
      <div class="menu-btn-group">
        <button class="btn" onclick="startGame()">RETRY</button>
        <button class="btn secondary" onclick="quitGame()">MAIN MENU</button>
      </div>
    </div>
